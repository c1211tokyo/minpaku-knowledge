name: Validate static knowledge base

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "15 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate content and links
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/validate.py --external
          else
            python scripts/validate.py
          fi
